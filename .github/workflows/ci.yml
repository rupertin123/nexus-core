# Continuous Integration for Nexus-Core.
#
# Runs the full Rust + Python test suite on every push and pull
# request targeting the `main` branch, across the three supported
# host platforms. The matrix exists to catch platform-specific
# regressions in the PyO3 FFI surface and the crossterm-backed TUI
# before they reach a release tag.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref so a fast-pushing branch
# does not pile up redundant matrix jobs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Build native extension via maturin
        run: uv run maturin develop

      - name: Run pytest suite
        run: uv run pytest tests/ -v
